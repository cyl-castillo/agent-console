name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Stage 1: create (or reuse) ONE draft release up front and expose its id.
  # The build matrix then uploads to this fixed id instead of each job racing to
  # create/update the release for the tag — that race dropped Windows assets on
  # v0.41.0/v0.41.1. A draft stays invisible (and off the updater feed) until
  # stage 3 publishes it, so users never see a half-uploaded release.
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.GITHUB_REF_NAME;
            const { owner, repo } = context.repo;
            // Idempotent: reuse the release if the tag already has one (a re-cut
            // tag), else create a fresh draft. Force draft so the matrix uploads
            // land before anyone can see the release.
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({ owner, repo, release_id: data.id, draft: true });
              return data.id;
            } catch (e) {
              const { data } = await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: `Agent Console ${tag}`,
                draft: true,
                prerelease: false,
              });
              return data.id;
            }

  # Stage 2: build every platform and upload its bundles to the release created
  # above (releaseId is fixed, so no create/clobber race between jobs).
  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        # Never fail the release over caching. The save runs in a post-job step
        # after artifacts are already built/uploaded, and tar/zstd on Windows
        # occasionally errors there — a cosmetic red ❌ on an otherwise-complete
        # release. continue-on-error covers both the main and post steps.
        continue-on-error: true
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # whisper.cpp (via whisper-rs) uses std::filesystem, which Apple marks
          # available only from macOS 10.15. The cc crate reads this env var to
          # set -mmacosx-version-min; without it the default (10.13) fails to
          # compile ggml-backend-reg.cpp. Harmless on Linux/Windows.
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        with:
          # Upload into the pre-created draft. tauri-action merges each platform
          # into the release's existing latest.json, so the updater feed ends up
          # complete regardless of job finish order.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # Stage 3: every platform uploaded — flip the draft to published so the release
  # (and its updater feed) go live all at once, complete.
  publish-release:
    needs: [create-release, build-tauri]
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({
              owner, repo,
              release_id: Number(process.env.release_id),
              draft: false,
              prerelease: false,
            });

  # Publish the npm launcher (launcher/) AFTER the release is live — the launcher
  # fetches those assets at runtime, so it must not go out ahead of them. Only
  # runs for real version tags; skips cleanly if the version is already on npm
  # (e.g. a re-cut tag).
  publish-launcher:
    needs: publish-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish launcher to npm
        working-directory: launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # No token configured → skip cleanly instead of failing the release.
          # The npm launcher is an optional install path (npx); the platform
          # release assets above are unaffected by it.
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret not set — skipping launcher publish."
            exit 0
          fi
          # The published version always matches the release tag, so the launcher
          # fetches the assets from its own release. The committed version is just
          # a dev default.
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          NAME="$(npm pkg get name | tr -d '"')"
          # `npm view pkg@version version` prints the version when published and
          # nothing (exit 0) when that version is absent — so test for output,
          # not exit code.
          EXISTING="$(npm view "$NAME@$VERSION" version 2>/dev/null || true)"
          if [ -n "$EXISTING" ]; then
            echo "$NAME@$VERSION already on npm — skipping publish."
          else
            npm publish --access public
          fi
