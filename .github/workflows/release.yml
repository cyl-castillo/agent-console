name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        # Never fail the release over caching. The save runs in a post-job step
        # after artifacts are already built/uploaded, and tar/zstd on Windows
        # occasionally errors there — a cosmetic red ❌ on an otherwise-complete
        # release. continue-on-error covers both the main and post steps.
        continue-on-error: true
        with:
          workspaces: './src-tauri -> target'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # whisper.cpp (via whisper-rs) uses std::filesystem, which Apple marks
          # available only from macOS 10.15. The cc crate reads this env var to
          # set -mmacosx-version-min; without it the default (10.13) fails to
          # compile ggml-backend-reg.cpp. Harmless on Linux/Windows.
          MACOSX_DEPLOYMENT_TARGET: '10.15'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Agent Console ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: false

  # Publish the npm launcher (launcher/) AFTER every platform's release assets
  # are uploaded — the launcher fetches those assets at runtime, so it must not
  # go out ahead of them. Only runs for real version tags; skips cleanly if the
  # version is already on npm (e.g. a re-cut tag).
  publish-launcher:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Publish launcher to npm
        working-directory: launcher
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          # The published version always matches the release tag, so the launcher
          # fetches the assets from its own release. The committed version is just
          # a dev default.
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          NAME="$(npm pkg get name | tr -d '"')"
          # `npm view pkg@version version` prints the version when published and
          # nothing (exit 0) when that version is absent — so test for output,
          # not exit code.
          EXISTING="$(npm view "$NAME@$VERSION" version 2>/dev/null || true)"
          if [ -n "$EXISTING" ]; then
            echo "$NAME@$VERSION already on npm — skipping publish."
          else
            npm publish --access public
          fi
          args: ${{ matrix.args }}
